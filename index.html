  <!-- Repasse ttclid (TikTok Click ID) -->
  <script>
  (function () {
    try {
      var urlParams = new URLSearchParams(window.location.search);
      var ttclid = urlParams.get('ttclid');
      if (ttclid) {
        sessionStorage.setItem('ttclid', ttclid);
      } else {
        ttclid = sessionStorage.getItem('ttclid');
      }
      if (!ttclid) return;

      // Injeta ttclid em todos os <a href> ao carregar e em mutações futuras
      function patchLinks() {
        document.querySelectorAll('a[href]').forEach(function (link) {
          try {
            var url = new URL(link.href, window.location.origin);
            if (['http:', 'https:'].includes(url.protocol) && !url.searchParams.get('ttclid')) {
              url.searchParams.set('ttclid', ttclid);
              link.href = url.toString();
            }
          } catch (e) {}
        });
      }

      // Intercepta window.location.href / .assign / .replace para preservar ttclid em redirects programáticos
      var origAssign = window.location.assign.bind(window.location);
      var origReplace = window.location.replace.bind(window.location);
      function withTtclid(href) {
        try {
          var url = new URL(href, window.location.origin);
          if (['http:', 'https:'].includes(url.protocol) && !url.searchParams.get('ttclid')) {
            url.searchParams.set('ttclid', ttclid);
            return url.toString();
          }
        } catch (e) {}
        return href;
      }
      window.location.assign = function (h) { return origAssign(withTtclid(h)); };
      window.location.replace = function (h) { return origReplace(withTtclid(h)); };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', patchLinks);
      } else {
        patchLinks();
      }
      new MutationObserver(patchLinks).observe(document.documentElement, { childList: true, subtree: true });
    } catch (e) {}
  })();
  </script>
